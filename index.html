:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; font-size: 16px; line-height: 1.5; }

button, .panel-close { font-family: inherit; font-weight: 600; }

.app {

.header {

.header h1 { font-size: 16px; font-weight: 600; }
.header .subtitle { font-size: 12px; opacity: 0.7; }

.map-section {

  margin: 0 auto;
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.map-hint {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.map-wrapper {
  position: relative;
  width: 100%;
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  border: 0.5px solid var(--color-border-tertiary);
  background: #fdf8f0;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-height: 260px;
}

#mapViewport {
  position: relative;
  width: 100%;
  max-width: 1600px;
  transform-origin: center center;
  display: inline-block;
}

#hotspotsContainer {
  position: absolute;
  inset: 0;
}

#mapViewport img {
  width: 100%;
  height: auto;
  display: block;
  pointer-events: none;
}

@media (max-width: 640px) {
  .map-section { padding: 12px; }
  .map-wrapper { min-height: 320px; }
}

.hotspot {
  position: absolute;
  border-radius: 6px;
  background: rgba(255,255,255,0);
  border: 2px solid transparent;
  transition: background 0.15s, border-color 0.15s;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hotspot:hover {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.6);
}
.hotspot:active {
  background: rgba(255,255,255,0.4);
}

.panel-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(7, 16, 28, 0.58);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.panel-overlay.open { display: flex; }

.panel {
  background: #ffffff;
  color: #14213d;
  border-radius: 18px;
  padding: 22px;
  max-width: 440px;
  width: 100%;
  border: 1px solid rgba(15, 23, 42, 0.08);
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
}

.panel-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 18px;
}
.panel-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.panel-title {
  font-size: 20px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.25;
  flex: 1;
  padding-top: 4px;
}
.panel-close {
  background: #f3f6fb;
  border: 1px solid rgba(15, 23, 42, 0.08);
  cursor: pointer;
  color: #334155;
  font-size: 28px;
  width: 44px;
  height: 44px;
  min-width: 44px;
  min-height: 44px;
  border-radius: 12px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.panel-close:hover,
.panel-close:active {
  background: #e2e8f0;
}

.panel-media {
  border-radius: 16px;
  overflow: hidden;
  background: #e5e7eb;
  margin-bottom: 18px;
  box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.04);
}

.panel-image-viewport {
  position: relative;
  width: 100%;
  max-height: min(52vh, 420px);
  aspect-ratio: 3 / 4;
  overflow: hidden;
  background: #dbe1e8;
  touch-action: none;
  cursor: grab;
}

.panel-image-viewport.is-zoomed {
  cursor: move;
}

.panel-image-viewport.is-dragging {
  cursor: grabbing;
}

.panel-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #e2e8f0;
  transition: opacity 0.18s ease, transform 0.12s ease-out;
  image-rendering: auto;
  transform-origin: center center;
  user-select: none;
  -webkit-user-drag: none;
}

.panel-image.is-loading {
  opacity: 0.35;
}

.panel-media .no-media {
  display: none;
  min-height: 240px;
  padding: 24px 18px;
  text-align: center;
  color: #64748b;
  font-size: 14px;
}

.panel-gallery {
  display: flex;
  gap: 10px;
  padding: 12px;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: rgba(148, 163, 184, 0.9) transparent;
}

.panel-gallery::-webkit-scrollbar {
  height: 8px;
}

.panel-gallery::-webkit-scrollbar-thumb {
  background: rgba(148, 163, 184, 0.9);
  border-radius: 999px;
}

.panel-gallery::-webkit-scrollbar-track {
  background: transparent;
}

.panel-thumb {
  position: relative;
  flex: 0 0 84px;
  width: 84px;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  border-radius: 12px;
  border: 2px solid transparent;
  cursor: pointer;
  background: #f8fafc;
  padding: 0;
  scroll-snap-align: start;
}

.panel-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  image-rendering: auto;
}

.panel-thumb.active {
  border-color: rgba(59, 130, 246, 0.85);
}

.panel-thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
}

.panel-media.no-images .no-media {
  display: grid;
}

.panel-media.no-images .panel-gallery,
.panel-media.no-images .panel-image,
.panel-media.no-images .panel-image-viewport {
  display: none;
}

.panel-badge {
  display: inline-block;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  font-weight: 700;
}

.info-row {
  display: flex;
  gap: 8px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(148, 163, 184, 0.24);
  font-size: 14px;
  align-items: flex-start;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: #64748b; min-width: 96px; font-weight: 600; }
.info-value { color: #0f172a; flex: 1; }

.desc-text {

  color: #334155;
  line-height: 1.7;
  margin-bottom: 18px;
}

@media (max-width: 640px) {

</style>

const imageViewport = document.getElementById('pImageViewport');
const mainPanelImage = document.getElementById('pMainImage');
const touchInteractionState = {
  startX: 0,
  startY: 0,
  moved: false,
  multitouch: false,
  suppressClickUntil: 0
};
const modalZoomState = {
  scale: 1,
  minScale: 1,
  maxScale: 4,
  translateX: 0,
  translateY: 0,
  dragPointerId: null,
  dragStartX: 0,
  dragStartY: 0,
  dragOriginX: 0,
  dragOriginY: 0,
  pinchStartDistance: 0,
  pinchStartScale: 1
};

function clampValue(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function clampModalImageTranslate() {
  const extraX = Math.max(0, (imageViewport.clientWidth * modalZoomState.scale - imageViewport.clientWidth) / 2);
  const extraY = Math.max(0, (imageViewport.clientHeight * modalZoomState.scale - imageViewport.clientHeight) / 2);
  modalZoomState.translateX = clampValue(modalZoomState.translateX, -extraX, extraX);
  modalZoomState.translateY = clampValue(modalZoomState.translateY, -extraY, extraY);
}

function updateModalImageTransform() {
  clampModalImageTranslate();
  mainPanelImage.style.transform = `translate(${modalZoomState.translateX}px, ${modalZoomState.translateY}px) scale(${modalZoomState.scale})`;
  imageViewport.classList.toggle('is-zoomed', modalZoomState.scale > 1.01);
}

function resetModalImageZoom() {
  modalZoomState.scale = 1;
  modalZoomState.translateX = 0;
  modalZoomState.translateY = 0;
  modalZoomState.dragPointerId = null;
  modalZoomState.pinchStartDistance = 0;
  imageViewport.classList.remove('is-dragging');
  updateModalImageTransform();
}

function zoomModalImage(nextScale, originX, originY) {
  const clampedScale = clampValue(nextScale, modalZoomState.minScale, modalZoomState.maxScale);
  const previousScale = modalZoomState.scale;
  if (clampedScale === previousScale) return;

  const offsetX = originX - imageViewport.clientWidth / 2;
  const offsetY = originY - imageViewport.clientHeight / 2;
  const ratio = clampedScale / previousScale;

  modalZoomState.translateX = (modalZoomState.translateX - offsetX) * ratio + offsetX;
  modalZoomState.translateY = (modalZoomState.translateY - offsetY) * ratio + offsetY;
  modalZoomState.scale = clampedScale;
  updateModalImageTransform();
}

function setMainPanelImage(src, alt) {
  resetModalImageZoom();
  mainPanelImage.classList.add('is-loading');
  mainPanelImage.src = src;
  mainPanelImage.alt = alt;
  mainPanelImage.style.display = 'block';
}

imageViewport.addEventListener('wheel', (event) => {
  if (!mainPanelImage.src || mainPanelImage.style.display === 'none') return;
  event.preventDefault();
  const rect = imageViewport.getBoundingClientRect();
  const originX = event.clientX - rect.left;
  const originY = event.clientY - rect.top;
  const delta = -event.deltaY * 0.0015;
  zoomModalImage(modalZoomState.scale + delta, originX, originY);
}, { passive: false });

imageViewport.addEventListener('pointerdown', (event) => {
  if (event.pointerType === 'touch' || modalZoomState.scale <= 1.01) return;
  event.preventDefault();
  modalZoomState.dragPointerId = event.pointerId;
  modalZoomState.dragStartX = event.clientX;
  modalZoomState.dragStartY = event.clientY;
  modalZoomState.dragOriginX = modalZoomState.translateX;
  modalZoomState.dragOriginY = modalZoomState.translateY;
  imageViewport.classList.add('is-dragging');
});

window.addEventListener('pointermove', (event) => {
  if (modalZoomState.dragPointerId !== event.pointerId) return;
  event.preventDefault();
  modalZoomState.translateX = modalZoomState.dragOriginX + (event.clientX - modalZoomState.dragStartX);
  modalZoomState.translateY = modalZoomState.dragOriginY + (event.clientY - modalZoomState.dragStartY);
  updateModalImageTransform();
});

window.addEventListener('pointerup', (event) => {
  if (modalZoomState.dragPointerId !== event.pointerId) return;
  modalZoomState.dragPointerId = null;
  imageViewport.classList.remove('is-dragging');
});

window.addEventListener('pointercancel', (event) => {
  if (modalZoomState.dragPointerId !== event.pointerId) return;
  modalZoomState.dragPointerId = null;
  imageViewport.classList.remove('is-dragging');
});

imageViewport.addEventListener('touchstart', (event) => {
  if (event.touches.length === 2) {
    modalZoomState.pinchStartDistance = Math.hypot(
      event.touches[0].clientX - event.touches[1].clientX,
      event.touches[0].clientY - event.touches[1].clientY
    );
    modalZoomState.pinchStartScale = modalZoomState.scale;
  }
}, { passive: false });

imageViewport.addEventListener('touchmove', (event) => {
  if (!mainPanelImage.src || mainPanelImage.style.display === 'none') return;

  if (event.touches.length === 2) {
    event.preventDefault();
    const currentDistance = Math.hypot(
      event.touches[0].clientX - event.touches[1].clientX,
      event.touches[0].clientY - event.touches[1].clientY
    );
    const rect = imageViewport.getBoundingClientRect();
    const originX = ((event.touches[0].clientX + event.touches[1].clientX) / 2) - rect.left;
    const originY = ((event.touches[0].clientY + event.touches[1].clientY) / 2) - rect.top;
    const ratio = currentDistance / (modalZoomState.pinchStartDistance || currentDistance);
    zoomModalImage(modalZoomState.pinchStartScale * ratio, originX, originY);
  } else if (event.touches.length === 1 && modalZoomState.scale > 1.01) {
    event.preventDefault();
    const touch = event.touches[0];
    if (!imageViewport.dataset.touchDragX) {
      imageViewport.dataset.touchDragX = String(touch.clientX);
      imageViewport.dataset.touchDragY = String(touch.clientY);
      imageViewport.dataset.touchOriginX = String(modalZoomState.translateX);
      imageViewport.dataset.touchOriginY = String(modalZoomState.translateY);
    }
    modalZoomState.translateX = Number(imageViewport.dataset.touchOriginX) + (touch.clientX - Number(imageViewport.dataset.touchDragX));
    modalZoomState.translateY = Number(imageViewport.dataset.touchOriginY) + (touch.clientY - Number(imageViewport.dataset.touchDragY));
    updateModalImageTransform();
  }
}, { passive: false });

imageViewport.addEventListener('touchend', () => {
  delete imageViewport.dataset.touchDragX;
  delete imageViewport.dataset.touchDragY;
  delete imageViewport.dataset.touchOriginX;
  delete imageViewport.dataset.touchOriginY;
  modalZoomState.pinchStartDistance = 0;
}, { passive: true });

// Simple pan & pinch-to-zoom implementation for web
function initPanZoom() {
  const viewport = document.getElementById('mapViewport');
  const maxScale = 3;
  const tapMoveThreshold = 8;
  let minScale = 1;
  let scale = 1;
  let lastScale = 1;
  let startDist = 0;
  let translate = { x: 0, y: 0 };
  let lastTouch = null;

  function getBaseSize() {
    return {
      width: viewport.offsetWidth,
      height: viewport.offsetHeight
    };
  }

  function isPortraitViewport() {
    return window.matchMedia('(orientation: portrait)').matches;
  }

  function clampScale(nextScale) {
    return Math.min(maxScale, Math.max(minScale, nextScale));
  }

  function clampTranslate(nextTranslate) {
    const { width: baseWidth, height: baseHeight } = getBaseSize();
    const scaledWidth = baseWidth * scale;
    const scaledHeight = baseHeight * scale;
    const maxX = Math.max(0, (scaledWidth - mapWrapper.clientWidth) / 2);
    const maxY = Math.max(0, (scaledHeight - mapWrapper.clientHeight) / 2);

    return {
      x: Math.min(maxX, Math.max(-maxX, nextTranslate.x)),
      y: Math.min(maxY, Math.max(-maxY, nextTranslate.y))
    };
  }

  function setTransform() {
    translate = clampTranslate(translate);
    viewport.style.transform = `translate(${translate.x}px, ${translate.y}px) scale(${scale})`;
  }

  function resetView() {
    viewport.style.transform = 'translate(0px, 0px) scale(1)';
    const { width: baseWidth, height: baseHeight } = getBaseSize();
    if (!baseWidth || !baseHeight) return;

    const fitWidthScale = mapWrapper.clientWidth / baseWidth;
    const fitHeightScale = mapWrapper.clientHeight / baseHeight;

    minScale = isPortraitViewport() ? Math.max(1, fitHeightScale) : Math.max(1, fitWidthScale);
    scale = minScale;
    lastScale = scale;
    translate = { x: 0, y: 0 };
    setTransform();
  }

  // Touch handlers
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      touchInteractionState.multitouch = true;
      touchInteractionState.moved = true;
      touchInteractionState.suppressClickUntil = Date.now() + 400;
      startDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      lastScale = scale;
    } else if (e.touches.length === 1) {
      touchInteractionState.startX = e.touches[0].clientX;
      touchInteractionState.startY = e.touches[0].clientY;
      touchInteractionState.moved = false;
      touchInteractionState.multitouch = false;
      lastTouch = { x: e.touches[0].clientX - translate.x, y: e.touches[0].clientY - translate.y };
    }
  }, { passive: false });

  viewport.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      touchInteractionState.multitouch = true;
      touchInteractionState.moved = true;
      touchInteractionState.suppressClickUntil = Date.now() + 400;
      const curDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const delta = curDist / startDist;
      scale = clampScale(lastScale * delta);
      setTransform();
    } else if (e.touches.length === 1 && lastTouch) {
      e.preventDefault();
      const movedX = Math.abs(e.touches[0].clientX - touchInteractionState.startX);
      const movedY = Math.abs(e.touches[0].clientY - touchInteractionState.startY);
      if (movedX > tapMoveThreshold || movedY > tapMoveThreshold) {
        touchInteractionState.moved = true;
        touchInteractionState.suppressClickUntil = Date.now() + 400;
      }
      translate = {
        x: e.touches[0].clientX - lastTouch.x,
        y: e.touches[0].clientY - lastTouch.y
      };
      setTransform();
    }
  }, { passive: false });

  viewport.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
      if (touchInteractionState.moved || touchInteractionState.multitouch) {
        touchInteractionState.suppressClickUntil = Date.now() + 400;
      }
      touchInteractionState.moved = false;
      touchInteractionState.multitouch = false;
      lastTouch = null;
    }
  });

  // Mouse wheel zoom
  mapWrapper.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey || e.altKey) return; // avoid interfering with browser zoom
    e.preventDefault();
    const delta = -e.deltaY * 0.001;
    scale = clampScale(scale + delta);
    setTransform();
  }, { passive: false });

  window.addEventListener('resize', resetView);
  resetView();
}

function renderHotspots(natW, natH) {
  hotspotsContainer.innerHTML = '';
  areas.forEach(area => {
    const div = document.createElement('div');
    div.className = 'hotspot';
    div.style.left = area.x + '%';
    div.style.top = area.y + '%';
    div.style.width = area.w + '%';
    div.style.height = area.h + '%';
    div.setAttribute('title', area.label);
    div.addEventListener('click', (event) => {
      if (Date.now() < touchInteractionState.suppressClickUntil) {
        event.preventDefault();
        return;
      }
      openPanel(area);
    });
    hotspotsContainer.appendChild(div);
  });
}

function openPanel(area) {
  document.getElementById('pIcon').textContent = area.icon;
  document.getElementById('pIcon').style.background = area.categoryColor;
  document.getElementById('pTitle').textContent = area.label;
  const badge = document.getElementById('pBadge');
  badge.textContent = area.category;
  badge.style.background = area.categoryColor;
  badge.style.color = area.categoryText;
  document.getElementById('pDesc').textContent = area.desc;

  const mainImage = document.getElementById('pMainImage');
  const gallery = document.getElementById('pGallery');
  const noMedia = document.getElementById('pNoMedia');
  const imageList = imageGallery[area.id] || [];

  gallery.innerHTML = '';
  if (imageList.length > 0) {
    mainImage.onerror = () => {
      mainImage.style.display = 'none';
      noMedia.style.display = 'grid';
      resetModalImageZoom();
    };
    noMedia.style.display = 'none';
    setMainPanelImage(imageList[0], `${area.label} - imagen`);

    imageList.forEach((src, index) => {
      const thumb = document.createElement('button');
      thumb.type = 'button';
      thumb.className = 'panel-thumb' + (index === 0 ? ' active' : '');
      const thumbImg = document.createElement('img');
      thumbImg.src = src;
      thumbImg.alt = `${area.label} miniatura ${index + 1}`;
      thumbImg.onerror = () => {
        thumbImg.style.display = 'none';
      };
      thumb.appendChild(thumbImg);
      thumb.addEventListener('click', () => {
        noMedia.style.display = 'none';
        setMainPanelImage(src, `${area.label} - imagen`);
        gallery.querySelectorAll('.panel-thumb').forEach(btn => btn.classList.remove('active'));
        thumb.classList.add('active');
      });
      gallery.appendChild(thumb);
    });
  } else {
    mainImage.src = '';
    mainImage.alt = `Sin imagen disponible`;
    mainImage.style.display = 'none';
    noMedia.style.display = 'grid';
    resetModalImageZoom();
  }

  const rows = document.getElementById('pRows');
  rows.innerHTML = '';
  if (area.info) {
    Object.entries(area.info).forEach(([k, v]) => {
      const row = document.createElement('div');
      row.className = 'info-row';
      row.innerHTML = `<span class="info-label">${k}</span><span class="info-value">${v}</span>`;
      rows.appendChild(row);
    });
  }
  overlay.classList.add('open');
}

closeBtn.addEventListener('click', () => {
  resetModalImageZoom();
  overlay.classList.remove('open');
});
overlay.addEventListener('click', e => {
  if (e.target === overlay) {
    resetModalImageZoom();
    overlay.classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    resetModalImageZoom();
    overlay.classList.remove('open');
  }
});
</script>
