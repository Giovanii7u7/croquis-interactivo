// Simple pan & pinch-to-zoom implementation for web
function initPanZoom() {
  const viewport = document.getElementById('mapViewport');
  const maxScale = 3;
  let minScale = 1;
  let scale = 1;
  let lastScale = 1;
  let startDist = 0;
  let translate = { x: 0, y: 0 };
  let lastTouch = null;

  function getBaseSize() {
    return {
      width: viewport.offsetWidth,
      height: viewport.offsetHeight
    };
  }

  function isPortraitViewport() {
    return window.matchMedia('(orientation: portrait)').matches;
  }

  function clampScale(nextScale) {
    return Math.min(maxScale, Math.max(minScale, nextScale));
  }

  function clampTranslate(nextTranslate) {
    const { width: baseWidth, height: baseHeight } = getBaseSize();
    const scaledWidth = baseWidth * scale;
    const scaledHeight = baseHeight * scale;
    const maxX = Math.max(0, (scaledWidth - mapWrapper.clientWidth) / 2);
    const maxY = Math.max(0, (scaledHeight - mapWrapper.clientHeight) / 2);

    return {
      x: Math.min(maxX, Math.max(-maxX, nextTranslate.x)),
      y: Math.min(maxY, Math.max(-maxY, nextTranslate.y))
    };
  }

  function setTransform() {
    translate = clampTranslate(translate);
    viewport.style.transform = `translate(${translate.x}px, ${translate.y}px) scale(${scale})`;
  }

  function resetView() {
    viewport.style.transform = 'translate(0px, 0px) scale(1)';
    const { width: baseWidth, height: baseHeight } = getBaseSize();
    if (!baseWidth || !baseHeight) return;

    const fitWidthScale = mapWrapper.clientWidth / baseWidth;
    const fitHeightScale = mapWrapper.clientHeight / baseHeight;

    minScale = isPortraitViewport() ? Math.max(1, fitHeightScale) : Math.max(1, fitWidthScale);
    scale = minScale;
    lastScale = scale;
    translate = { x: 0, y: 0 };
    setTransform();
  }

  // Touch handlers
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      startDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      lastScale = scale;
    } else if (e.touches.length === 1) {
      lastTouch = { x: e.touches[0].clientX - translate.x, y: e.touches[0].clientY - translate.y };
    }
  }, { passive: false });

  viewport.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const curDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const delta = curDist / startDist;
      scale = clampScale(lastScale * delta);
      setTransform();
    } else if (e.touches.length === 1 && lastTouch) {
      e.preventDefault();
      translate = {
        x: e.touches[0].clientX - lastTouch.x,
        y: e.touches[0].clientY - lastTouch.y
      };
      setTransform();
    }
  }, { passive: false });

  viewport.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) lastTouch = null;
  });

  // Mouse wheel zoom
  mapWrapper.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey || e.altKey) return; // avoid interfering with browser zoom
    e.preventDefault();
    const delta = -e.deltaY * 0.001;
    scale = clampScale(scale + delta);
    setTransform();
  }, { passive: false });

  window.addEventListener('resize', resetView);
  resetView();
}

<script>
const editorMapWrapper = document.getElementById('mapWrapper');
const editorMapImg = document.getElementById('mapImg');
const editorHotspotsContainer = document.getElementById('hotspotsContainer');
const editorOverlay = document.getElementById('overlay');
const editorToggleBtn = document.getElementById('toggleEditorBtn');
const editorSaveBtn = document.getElementById('saveLayoutBtn');
const editorResetBtn = document.getElementById('resetLayoutBtn');
const editorStatusText = document.getElementById('editorStatus');

const editorOriginalAreas = areas.map(area => ({
  ...area,
  info: area.info ? { ...area.info } : undefined
}));

const editorState = {
  enabled: false,
  activePointerId: null,
  activeAreaId: null,
  dragMode: null,
  startPointer: null,
  startArea: null,
  panZoomBound: false
};

function editorClamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function editorFindArea(areaId) {
  return areas.find(area => area.id === areaId);
}

function editorSetStatus(message) {
  editorStatusText.textContent = message;
}

function editorSyncButtons() {
  editorToggleBtn.classList.toggle('is-active', editorState.enabled);
  editorToggleBtn.textContent = editorState.enabled ? 'Salir de edición' : 'Editar recuadros';
  editorSaveBtn.disabled = !editorState.enabled;
  editorResetBtn.disabled = !editorState.enabled;
  editorMapWrapper.classList.toggle('is-editing', editorState.enabled);
}

function editorRenderHotspots() {
  editorHotspotsContainer.innerHTML = '';

  areas.forEach(area => {
    const hotspot = document.createElement('div');
    hotspot.className = 'hotspot';
    hotspot.style.left = area.x + '%';
    hotspot.style.top = area.y + '%';
    hotspot.style.width = area.w + '%';
    hotspot.style.height = area.h + '%';
    hotspot.setAttribute('title', area.label);

    if (editorState.enabled) {
      if (editorState.activeAreaId === area.id) {
        hotspot.classList.add('is-selected');
      }

      const label = document.createElement('span');
      label.className = 'hotspot-label';
      label.textContent = area.label;

      const handle = document.createElement('span');
      handle.className = 'hotspot-handle';
      handle.dataset.handle = 'resize';

      hotspot.appendChild(label);
      hotspot.appendChild(handle);

      hotspot.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        event.stopPropagation();

        editorState.activeAreaId = area.id;
        editorState.activePointerId = event.pointerId;
        editorState.dragMode = event.target.dataset.handle === 'resize' ? 'resize' : 'move';
        editorState.startPointer = { x: event.clientX, y: event.clientY };
        editorState.startArea = { x: area.x, y: area.y, w: area.w, h: area.h };

        editorSetStatus(`Editando "${area.label}": arrastra para ${editorState.dragMode === 'move' ? 'mover' : 'cambiar tamaño'}.`);
        editorRenderHotspots();
      });
    } else {
      hotspot.addEventListener('click', () => openPanel(area));
    }

    editorHotspotsContainer.appendChild(hotspot);
  });
}

function renderHotspots() {
  editorRenderHotspots();
}

function openPanel(area) {
  if (editorState.enabled) return;

  document.getElementById('pIcon').textContent = area.icon;
  document.getElementById('pIcon').style.background = area.categoryColor;
  document.getElementById('pTitle').textContent = area.label;
  const badge = document.getElementById('pBadge');
  badge.textContent = area.category;
  badge.style.background = area.categoryColor;
  badge.style.color = area.categoryText;
  document.getElementById('pDesc').textContent = area.desc;

  const rows = document.getElementById('pRows');
  rows.innerHTML = '';
  if (area.info) {
    Object.entries(area.info).forEach(([key, value]) => {
      const row = document.createElement('div');
      row.className = 'info-row';
      row.innerHTML = `<span class="info-label">${key}</span><span class="info-value">${value}</span>`;
      rows.appendChild(row);
    });
  }

  editorOverlay.classList.add('open');
}

function editorEndDrag() {
  editorState.activePointerId = null;
  editorState.dragMode = null;
  editorState.startPointer = null;
  editorState.startArea = null;
}

function editorUpdateAreaFromPointer(event) {
  const area = editorFindArea(editorState.activeAreaId);
  const rect = editorHotspotsContainer.getBoundingClientRect();
  if (!area || !rect.width || !rect.height || !editorState.startPointer || !editorState.startArea) return;

  const deltaX = ((event.clientX - editorState.startPointer.x) / rect.width) * 100;
  const deltaY = ((event.clientY - editorState.startPointer.y) / rect.height) * 100;
  const minSize = 1.5;

  if (editorState.dragMode === 'move') {
    area.x = editorClamp(editorState.startArea.x + deltaX, 0, 100 - area.w);
    area.y = editorClamp(editorState.startArea.y + deltaY, 0, 100 - area.h);
  } else if (editorState.dragMode === 'resize') {
    area.w = editorClamp(editorState.startArea.w + deltaX, minSize, 100 - area.x);
    area.h = editorClamp(editorState.startArea.h + deltaY, minSize, 100 - area.y);
  }
}

function editorToggleMode(forceValue) {
  editorState.enabled = typeof forceValue === 'boolean' ? forceValue : !editorState.enabled;
  editorState.activeAreaId = null;
  editorEndDrag();
  editorOverlay.classList.remove('open');
  editorSyncButtons();
  editorRenderHotspots();

  if (editorState.enabled) {
    editorSetStatus('Modo edición activo: arrastra un recuadro para moverlo y usa el punto naranja para cambiar su tamaño.');
  } else {
    editorSetStatus('Modo normal: toca cualquier área para ver su información.');
  }
}

function editorDownloadLayout() {
  const payload = {
    exportedAt: new Date().toISOString(),
    areas: areas.map(({ id, label, x, y, w, h }) => ({
      id,
      label,
      x: Number(x.toFixed(2)),
      y: Number(y.toFixed(2)),
      w: Number(w.toFixed(2)),
      h: Number(h.toFixed(2))
    }))
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'hotspots-layout.json';
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);

  editorSetStatus('Se descargó hotspots-layout.json con las posiciones actuales de los recuadros.');
}

function editorRestoreLayout() {
  areas.forEach((area, index) => {
    area.x = editorOriginalAreas[index].x;
    area.y = editorOriginalAreas[index].y;
    area.w = editorOriginalAreas[index].w;
    area.h = editorOriginalAreas[index].h;
  });

  editorRenderHotspots();
  editorSetStatus('Se restauraron las coordenadas originales del archivo.');
}

function initPanZoom() {
  if (editorState.panZoomBound) return;
  editorState.panZoomBound = true;

  const viewport = document.getElementById('mapViewport');
  const maxScale = 3;
  let minScale = 1;
  let scale = 1;
  let lastScale = 1;
  let startDist = 0;
  let translate = { x: 0, y: 0 };
  let lastTouch = null;

  function getBaseSize() {
    return {
      width: viewport.offsetWidth,
      height: viewport.offsetHeight
    };
  }

  function isPortraitViewport() {
    return window.matchMedia('(orientation: portrait)').matches;
  }

  function clampScale(nextScale) {
    return Math.min(maxScale, Math.max(minScale, nextScale));
  }

  function clampTranslate(nextTranslate) {
    const { width: baseWidth, height: baseHeight } = getBaseSize();
    const scaledWidth = baseWidth * scale;
    const scaledHeight = baseHeight * scale;
    const maxX = Math.max(0, (scaledWidth - editorMapWrapper.clientWidth) / 2);
    const maxY = Math.max(0, (scaledHeight - editorMapWrapper.clientHeight) / 2);

    return {
      x: Math.min(maxX, Math.max(-maxX, nextTranslate.x)),
      y: Math.min(maxY, Math.max(-maxY, nextTranslate.y))
    };
  }

  function setTransform() {
    translate = clampTranslate(translate);
    viewport.style.transform = `translate(${translate.x}px, ${translate.y}px) scale(${scale})`;
  }

  function resetView() {
    viewport.style.transform = 'translate(0px, 0px) scale(1)';
    const { width: baseWidth, height: baseHeight } = getBaseSize();
    if (!baseWidth || !baseHeight) return;

    const fitWidthScale = editorMapWrapper.clientWidth / baseWidth;
    const fitHeightScale = editorMapWrapper.clientHeight / baseHeight;
    minScale = isPortraitViewport() ? Math.max(1, fitHeightScale) : Math.max(1, fitWidthScale);
    scale = minScale;
    lastScale = scale;
    translate = { x: 0, y: 0 };
    setTransform();
  }

  viewport.addEventListener('touchstart', (event) => {
    if (editorState.enabled) return;

    if (event.touches.length === 2) {
      startDist = Math.hypot(
        event.touches[0].clientX - event.touches[1].clientX,
        event.touches[0].clientY - event.touches[1].clientY
      );
      lastScale = scale;
    } else if (event.touches.length === 1) {
      lastTouch = {
        x: event.touches[0].clientX - translate.x,
        y: event.touches[0].clientY - translate.y
      };
    }
  }, { passive: false });

  viewport.addEventListener('touchmove', (event) => {
    if (editorState.enabled) return;

    if (event.touches.length === 2) {
      event.preventDefault();
      const currentDistance = Math.hypot(
        event.touches[0].clientX - event.touches[1].clientX,
        event.touches[0].clientY - event.touches[1].clientY
      );
      const delta = currentDistance / startDist;
      scale = clampScale(lastScale * delta);
      setTransform();
    } else if (event.touches.length === 1 && lastTouch) {
      event.preventDefault();
      translate = {
        x: event.touches[0].clientX - lastTouch.x,
        y: event.touches[0].clientY - lastTouch.y
      };
      setTransform();
    }
  }, { passive: false });

  viewport.addEventListener('touchend', () => {
    if (editorState.enabled) return;
    lastTouch = null;
  });

  editorMapWrapper.addEventListener('wheel', (event) => {
    if (editorState.enabled) return;
    if (event.ctrlKey || event.metaKey || event.altKey) return;
    event.preventDefault();
    scale = clampScale(scale + (-event.deltaY * 0.001));
    setTransform();
  }, { passive: false });

  window.addEventListener('resize', resetView);
  resetView();
}

window.addEventListener('pointermove', (event) => {
  if (!editorState.enabled || editorState.activePointerId !== event.pointerId || !editorState.activeAreaId) return;
  event.preventDefault();
  editorUpdateAreaFromPointer(event);
  editorRenderHotspots();
});

window.addEventListener('pointerup', (event) => {
  if (editorState.activePointerId !== event.pointerId) return;
  editorEndDrag();
});

window.addEventListener('pointercancel', (event) => {
  if (editorState.activePointerId !== event.pointerId) return;
  editorEndDrag();
});

editorToggleBtn.addEventListener('click', () => editorToggleMode());
editorSaveBtn.addEventListener('click', editorDownloadLayout);
editorResetBtn.addEventListener('click', editorRestoreLayout);

editorMapImg.onload = () => {
  editorRenderHotspots();
  initPanZoom();
};

if (editorMapImg.complete) {
  editorRenderHotspots();
  initPanZoom();
}

editorSyncButtons();
</script>
